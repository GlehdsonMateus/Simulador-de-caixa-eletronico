<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa eletronico</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <header>
        <h1>Caixa Eletrônico</h1>
    </header>

    <h1 class="titulocadastrar">Cadastrar</h1>
    <label for="nome">Nome da conta:</label>
    <input type="text" id="nome" name="nome" placeholder="Digite o nome da conta">
    <label for="saldo">Saldo inicial:</label>  
    <input type="number" id="saldo" name="saldo" placeholder="Digite o saldo inicial" min="0" step="0.01">
    <button onclick="cadastrar()">Cadastrar</button>

    <h1 class="contas">Contas Cadastradas</h1>

    <label for="listaContas">Contas:</label>

    <select id="listaContas">
        <option value="">Selecione uma conta</option>
    </select>










<script src="script.js"></script>
</body>
</html>
