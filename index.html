<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa eletronico</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <header>
        <h1>Caixa Eletrônico</h1>
    </header>

    <dialog id="dialogo">
        <h1 class="titulocadastrar">Cadastrar</h1>
        <label for="nome">Nome da conta:</label>
        <input type="text" id="nome" required name="nome" placeholder="Digite o nome da conta">
        <label for="saldo">Saldo inicial:</label>  
        <input type="number" required id="saldo" name="saldo" placeholder="Digite o saldo inicial" min="0" step="0.01">
        <button class="botao" onclick="cadastrar()">Cadastrar</button>
    </dialog>

    <button class="botao" id="botao">Cadastrar Conta</button>

    <h1 class="contas">Contas Cadastradas</h1>

    <label for="listaContas">Contas:</label>

    <select id="listaContas">
        <option value="">Selecione uma conta</option>
    </select>

    <button class="botaodel" onclick="Deletar()">Deletar conta</button>
    <br>
    <br>
    <label for="valor">Valor:</label>
    <input type="number" id="valor" name="valor" placeholder="Digite o valor" min="0" step="0.01">


    <button class="botao" onclick="sacar()">Sacar</button>
    <button class="botao" onclick="depositar()">Depositar</button>

    <br>
    <br>
    <br>

    <h1>Transferência</h1>
    <label for="origem">Conta de Origem:</label>
    <select id="origem" onchange="atualizarTransferencia()">
        <option value="">Selecione uma conta</option>
    </select>
    <br>
    <label for="destino">Conta de Destino:</label>
    <select id="destino">
        <option value="">Selecione uma conta</option>
    </select>

    <br>
    <label for="valorTransferencia">Valor da Transferência:</label>
    <input type="number" id="valorTransferencia" name="valorTransferencia" placeholder="Digite o valor da transferência" min="0" step="0.01">
    <button class="botao" onclick="transferir()">Transferir</button>
    <br>
    <br>

    <h1>Historico</h1>
    <table id="tabelaHistorico" border="2">
    <thead>
        <tr>
            <th>Data/Hora</th>
            <th>Conta</th>
            <th>Tipo</th>
            <th>Valor</th>
            <th>Saldo Restante</th>
            
        </tr>
    </thead>

    <tbody id="historico">
    </tbody>
</table>



<script src="script.js"></script>
</body>
</html>
